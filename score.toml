# julia --project=. --threads 36 score.jl score.toml
# nohup julia --project=. --threads 36 score.jl score.toml > score.log 2>&1 &

[data]
# Input trajectory file generated by the Brusselator ensemble simulation script.
input_hdf5 = "Data/baseline/sim.h5"

# Fraction of the saved trajectory discarded before building the training set.
burnin_fraction = 0.1

# Use one sample every data_every from the full post-burn-in ensemble dataset.
data_every = 10

# Maximum number of state samples retained for score training after thinning.
max_samples = 1_000_000

[training]
# Denoising score matching noise level. Fixed to the requested value.
sigma = 0.05

# Width of each hidden layer in the plain neural network score model.
widths = [128, 64]

# Number of training epochs.
epochs = 100

# Mini-batch size for Adam optimization. Chosen to better utilize the GPU while
# remaining modest for an 11 GB device.
batch_size = 4126

# Adam learning rate.
learning_rate = 0.0001

# Base random seed for data shuffling, noise draws, and Langevin sampling.
seed = 20260406

[sampling]
# Euler-Maruyama time step for the score-driven Langevin sampler dX = s(X) dt + sqrt(2) dW.
dt = 0.002

# Total number of score-SDE integration steps.
steps = 100_000

# Number of initial integration steps discarded before collecting samples.
burnin_steps = 5000

# Keep one saved sample every save_stride score-SDE steps after burn-in.
save_stride = 20

# Number of parallel Langevin chains integrated after training.
chains = 1024

[figure]
# Number of bins used for the univariate and bivariate PDF estimates.
pdf_bins = 80

[output]
# BSON file used to save the trained score network and its diagnostics.
model_bson = "Data/baseline/score.bson"

# PNG file used to save the diagnostic figure.
figure_png = "Data/baseline/figures/score.png"