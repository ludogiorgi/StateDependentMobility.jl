# julia --project=. --threads 36 joint_score.jl joint_score.toml
# nohup julia --project=. --threads 36 joint_score.jl joint_score.toml > joint_score.log 2>&1 &

[data]
# Input trajectory file generated by sim.jl.
input_hdf5 = "Data/baseline/sim.h5"

# Burn-in fraction applied before drawing lagged pairs.
burnin_fraction = 0.1

# Minimum physical lag used for joint-score training.
tau_min = 0.025

# Maximum number of observed or generated lagged pairs retained per evaluation lag.
max_eval_pairs = 120_000

[training]
# Denoising score-matching noise level for the 4D pair variable [x0, y0, xt, yt].
sigma = 0.05

# Hidden widths for the lag-conditioned joint score network.
widths = [256, 128]

# Number of training epochs.
epochs = 80

# Number of freshly sampled lagged-pair batches per epoch.
batches_per_epoch = 1024

# Batch size for GPU training.
batch_size = 4096

# Adam learning rate.
learning_rate = 0.0001

# Base random seed.
seed = 20260407

[sampling]
# Euler-Maruyama step for the learned 4D Langevin sampler at fixed normalized lag t.
dt = 0.002

# Total number of sampler steps per evaluation lag.
steps = 40_000

# Burn-in steps discarded before collecting generated pair samples.
burnin_steps = 4_000

# Keep one generated sample every save_stride steps after burn-in.
save_stride = 20

# Number of chains simulated in parallel on the GPU for each evaluation lag.
chains = 512

[figure]
# Number of evaluation lags chosen evenly in [tau_min, tD].
eval_tau_count = 4

# Grid size used for 2D KDE diagnostics.
pdf_bins = 80

[output]
# BSON file containing the trained joint score network and diagnostics.
model_bson = "Data/baseline/joint_score.bson"

# PNG diagnostics figure.
figure_png = "Data/baseline/figures/joint_score.png"
